spring.application.name=pet-backend
server.port=${PORT:${SERVER_PORT:8080}}
spring.datasource.url=${DATABASE_URL:jdbc:mariadb://localhost:3306/pet_home?createDatabaseIfNotExist=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:sapassword}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,https://pet-home-frontend.vercel.app}
app.seed.enabled=${SEED_DATA:true}

app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:123}
