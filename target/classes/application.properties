spring.application.name=pet-backend
server.port=${PORT:${SERVER_PORT:8080}}
spring.datasource.url=${DATABASE_URL:jdbc:sqlserver://localhost:1433;databaseName=pet_home;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:123}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.use_nationalized_character_data=true

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,https://pet-home-frontend.vercel.app}
app.seed.enabled=${SEED_DATA:true}

app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:123}
